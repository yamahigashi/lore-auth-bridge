<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ self.t("admin.app.title") }}{% endblock %}</title>
  <link rel="stylesheet" href="/admin/static/pico.min.css">
  <script src="/admin/static/htmx.min.js" defer></script>
</head>
<body hx-boost="true">
  <header class="container">
    <nav>
      <ul>
        <li><strong>{{ self.t("admin.app.title") }}</strong></li>
      </ul>
      <ul>
        <li><a href="/admin?lang=en"{% if lang == "en" %} aria-current="page"{% endif %}>EN</a></li>
        <li><a href="/admin?lang=ja"{% if lang == "ja" %} aria-current="page"{% endif %}>JA</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <section aria-live="polite" class="flash" hidden></section>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
